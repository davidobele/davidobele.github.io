<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Home Page</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
		<style>
			a {
				text-decoration: none;
				color: white;
			}
			h1 {
				margin-bottom: 0;
			}
			a:hover {
				text-decoration: underline;
			}
			body {
				font-family: 'Inter', sans-serif;
				font-style: normal;
				font-weight: 400;
				min-height: 100vh;
				text-align: center;
				margin: 0;
				padding: 0;
				overflow: hidden;
				box-sizing: border-box;
				background-color: #895129;
				color: white;
				display: flex;
				flex-direction: column;
			}
			
			main {
				max-width: 1200px; 
				width: 90%;       
				margin: 0 auto;
				flex: 1;
			}
			
			footer {
				display: flex;
				flex-direction: row;
				justify-content: center;
				align-items: center;
				position: absolute;
				bottom: 0;
				width: 100%;
			}
			
			footer a:hover {
				text-decoration: underline;
			}
			
			@media (max-width: 1024px) {
				main {
					max-width: 900px;
					width: 95%;
				}
			}
			
			@media (max-width: 768px) {
				main {
					max-width: 600px;
					width: 100%;
				}
			}
			
			@media (max-width: 480px) {
				main {
					max-width: 100%;
					width: 100%;
				}
			}
		</style>
	</head>
	<body>
		<header>
			<h1>David Obele's Site</h1>
		</header>
		<main>
			<h2>Welcome to my Webpage</h2>
			<nav>
				<a href="itis3135/index.html" target="_blank">ITCS 3135</a>
			</nav>
		</main>
		<footer>
			<p>Designed by &copy; <a href="itis3135/DOdesign.html" target="_blank">DODesgin</a></p>
			<p>&nbsp;</p>
			<a href="https://validator.w3.org/check?uri=" target="_blank"><img src="itis3135/components/htmlValidationButton.png" alt="Valid HTML!"></a>
			<a href="https://jigsaw.w3.org/css-validator/validator?uri=" target="_blank"><img src="itis3135/components/cssValidationButton.png" alt ="Valid CSS!"></a>
		</footer>
	</body>
</html>
