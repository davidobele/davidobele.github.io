<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slideshow</title>
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="styles/default.css" rel="stylesheet">
    <link href="styles/slideshow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>David Obele ITIS 3135</h1>
        <div data-include="components/header.html"></div>
    </header>
    <main>
        <h2>Slideshow</h2>
        <div class = "container">
            <div class = "myslides">
                <div class = "numbertext">1 / 10</div>
                <img src = "images/dog.jpg"  alt="picutre">
            </div>
        
            <div class = "myslides">
                <div class = "numbertext">2 / 10</div>
                <img src = "images/apple.jpg" alt="picutre">
            </div>
        
            <div class="myslides">
                <div class="numbertext">3 / 10</div>
                <img src="images/vulture.jpg"  alt="picutre">
            </div>
        
            <div class="myslides">
                <div class="numbertext">4 / 10</div>
                <img src="images/ice.jpg"  alt="picutre">
            </div>
        
            <div class="myslides">
                <div class="numbertext">5 / 10</div>
                <img src="images/doctor.jpg"  alt="picutre">
            </div>
        
            <div class="myslides">
                <div class="numbertext">6 / 10</div>
                <img src="images/octopus.jpg"  alt="picutre">
            </div>
            <div class="myslides">
                <div class="numbertext">7 / 10</div>
                <img src="images/ballon.jpg"  alt="picutre">
            </div>
            <div class="myslides">
                <div class="numbertext">8 / 10</div>
                <img src="images/envelope.jpg"  alt="picutre">
            </div>
            <div class="myslides">
                <div class="numbertext">9 / 10</div>
                <img src="images/lion.jpg"  alt="picutre">
            </div>
            <div class="myslides">
                <div class="numbertext">10 / 10</div>
                <img src="images/elephant.jpg"  alt="picutre">
            </div>

            <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
            <a class="next" onclick="plusSlides(1)">&#10095;</a>
        
            <div class="caption-container">
                <p id="caption"></p>
            </div>
        
            <div class="row">
                <div class="column">
                    <img class="demo cursor" src="images/dog.jpg"  onclick="currentSlide(1)" alt="D: Dog">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/apple.jpg"  onclick="currentSlide(2)" alt="A: Apple">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/vulture.jpg"  onclick="currentSlide(3)" alt="V: Vulture">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/ice.jpg"  onclick="currentSlide(4)" alt="I: Ice">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/doctor.jpg"  onclick="currentSlide(5)" alt="D: Doctor">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/octopus.jpg"  onclick="currentSlide(6)" alt="O: Octopus">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/ballon.jpg"  onclick="currentSlide(7)" alt="B: Ballon">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/envelope.jpg"  onclick="currentSlide(8)" alt="E: Envelope">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/lion.jpg"  onclick="currentSlide(9)" alt="L: Lion">
                </div>
                <div class="column">
                    <img class="demo cursor" src="images/elephant.jpg"  onclick="currentSlide(10)" alt="E: Elephant">
                </div>
            </div>
        </div>
    </main>
    <footer class="footer">
        <div data-include="components/footer.html"></div>
    </footer>
    <script src="scripts/HTMLInclude.min.js"></script>
    <script src="scripts/slideshow.js"></script>
</body>
</html>
