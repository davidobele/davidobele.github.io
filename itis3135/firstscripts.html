<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>First JavaScripts</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
		<link href="styles/default.css" rel="stylesheet">
        <link href="styles/first.css" rel="stylesheet">
	</head>
	<body>
		<header>
			<h1>David Obele ITIS 3135</h1>
			<div data-include="components/header.html"></div>
		</header>
		<main>
			<h2>First JavaScripts</h2>
            <h3 id="current-time"></h3>

            <!-- Prompt the user for their name and mood -->
            <form id="user-form">
                <label for="user-name">What's your name?</label>
                <input type="text" id="user-name" placeholder="Enter your name" required>
    
                <label for="user-mood">How are you feeling today?</label>
                <input type="text" id="user-mood" placeholder="Enter your mood" required>
    
                <label for="favorite-number">What's your favorite number (0-10)?</label>
                <input type="number" id="favorite-number" min="0" max="100" placeholder="Enter a number" required>
    
                <button type="button" onclick="processForm()">Submit</button>
            </form>
    
            <!-- Area for brand-related buttons -->
            <div id="brand-functions">
                <h3>Decisive Ox Functions</h3>
                <button onclick="provideOxWisdom()">Provide Ox Wisdom</button>
                <button onclick="calculateOxStrength()">Calculate Ox Strength</button>
                <button onclick="generateOxNickname()">Generate Ox Nickname</button>
                <button onclick="inspireOxDetermination()">Inspire Ox Determination</button>
                <button onclick="simulateOxStomp()">Simulate Ox Stomp</button>
            </div>
		</main>
		<footer class="footer">
			<div data-include="components/footer.html"></div>
		</footer>
		<script src="scripts/HTMLInclude.min.js"></script>
        <script src="scripts/defaultScripts.js"></script>
	</body>
</html>
